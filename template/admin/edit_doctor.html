{% extends 'admin/adminlayout.html' %}
{% load static %}
{% block content %}

<div class="row">
         
      <div class="col-md-12">
       
          <div class="card">
            <div class="card-body">
              <h5 class="card-title fw-semibold mb-4">Forms</h5>
              <div class="card">
                <div class="card-body">

                    <form method="post" action="{% url 'update_doctor' %}" enctype="multipart/form-data">
                    {% csrf_token %}


                    <div class="mb-3">
                      <label for="exampleInputEmail1" class="form-label">Doctor name</label>
                      <input type="text" class="form-control" id="exampleInputEmail1" value="{{ dlist.doctor_name }}" name="do_name">
                    </div>
                    <div class="mb-3">
                      <label for="exampleInputPassword1" class="form-label">Doctor Phone</label>
                      <input type="text" class="form-control" id="exampleInputPassword1" value="{{ dlist.doctor_phone }}" name="do_phone">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Doctor Image</label><br>

                        {% if dlist.doctor_img %}
                            <img src="/media/{{ dlist.doctor_img }}"
                                style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:1px solid #ccc;margin-bottom:10px;">
                        {% else %}
                            <p class="text-muted">No image uploaded</p>
                        {% endif %}

                        <input type="file" class="form-control mt-2" name="do_img">
                        <small class="text-muted">Select a new image to change (leave empty to keep old image)</small>
                    </div>


                    <div class="mb-3">
                      <label for="exampleInputPassword1" class="form-label">Specialization</label>
                      <input type="text" class="form-control" id="exampleInputPassword1" value="{{ dlist.specialization }}" name="do_specialization">
                    </div>

                    <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Experience</label>
                        <input type="number" class="form-control" id="exampleInputPassword1" value="{{ dlist.experience }}" name="do_experience">
                      </div>

                      <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Doctor Email</label>
                        <input type="text" class="form-control" id="exampleInputPassword1" value="{{ dlist.doctor_email }}" name="do_email">
                      </div>

                      <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Password</label>
                        <input type="text" class="form-control" id="exampleInputPassword1" value="{{ dlist.password }}" name="do_password">
                      </div>

                      <div class="mb-3">
                        <label for="exampleInputPassword1" class="form-label">Doctor id</label>
                        <input type="hidden" class="form-control" id="exampleInputPassword1" value="{{ dlist.doctor_id }}" name="do_id">
                      </div>

                    <button type="submit" class="btn btn-primary">Submit</button>
                  </form>
                </div>
              </div>

              
        
        </div>
        </div>
      </div>
    

  </div>
  {% endblock %}
