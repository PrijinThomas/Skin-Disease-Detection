{% extends 'admin/adminlayout.html' %}
{% load static %}
{% block content %}

<div class="col-md-12">
       
          <div class="card">
            <div class="card-body">
              <h5 class="card-title fw-semibold mb-4">Forms</h5>
              <div class="card">
                <div class="card-body">
                  <form method="post" action="{% url 'd_update_disease' %}">
                    {% csrf_token %}
                  
                    {% if messages %}

                    {% for message in messages %}

                        <div class="alert {{ message.tags }}">
                            <h5 class="">{{ message }}</h5>
                        </div>
                    {% endfor %}
                    {% endif %}

                    <div class="mb-3">
                      <label for="exampleInputEmail1" class="form-label">Disease name</label>
                      <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" value="{{ dlist.disease_name }}" name="diseasename">
                      
                    </div>
                    <div class="mb-3">
                      <label for="exampleInputPassword1" class="form-label">Description</label>
                      <input type="text" class="form-control" id="exampleInputPassword1" value="{{ dlist.description }}" name="description">
                    </div>

                    <div class="mb-3">
                      <label for="exampleInputPassword1" class="form-label">symptoms</label>
                      <input type="text" class="form-control" id="exampleInputPassword1" value="{{ dlist.symptoms }}" name="symptoms">
                    </div>

                    <div class="mb-3">
                      <label for="exampleInputPassword1" class="form-label">precuations</label>
                      <input type="text" class="form-control" id="exampleInputPassword1" value="{{ dlist.precautions }}" name="precuations">
                    </div>
                      <input type="hidden" class="form-control" id="exampleInputPassword1" value="{{ dlist.disease_id }}" name="disease_id">

                    <button type="submit" class="btn btn-primary">Submit</button>
                  </form>
                </div>
              </div>

              

{% endblock %}
