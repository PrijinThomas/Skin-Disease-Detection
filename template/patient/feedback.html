{% extends 'patient/patientlayout.html' %}
{% load static %}
{% block content %}

<div class="row">

  <!-- LEFT SIDE : ADD FEEDBACK -->
  <div class="col-md-5">
    <div class="card">
      <div class="card-body">
        <h4 class="card-title">Add Feedback</h4>
        <p class="card-subtitle mb-3">Share your experience</p>

        <form method="post" action="{% url 'save_feedback' %}">
          {% csrf_token %}



          <div class="mb-3">
            <label class="form-label">Feedback</label>
            <textarea class="form-control" name="feedback" rows="5" required></textarea>
          </div>

         <button type="submit" class="btn btn-primary w-100">
            Submit Feedback
          </button> 

        </form>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDE : VIEW FEEDBACK -->
  <div class="col-md-7">
    <div class="card">
      <div class="card-body">
        <h4 class="card-title">Your Feedback</h4>
        <p class="card-subtitle mb-3">Previously submitted feedback</p>
        {% csrf_token %}

        
          {% for f in fblist %}
          <div class="border rounded p-3 mb-3">
            
            <p class="text-muted mb-1">
              {{ f.message }}
            </p>
            <small class="text-muted">
              {{ f.submitted_date }}
            </small>
          </div>

          <div class="col-md-2 text-end">
              <a href="{% url 'delete_feedback' f.feedback_id %}">Delete</a>
          </div>
          {% endfor %}
        
        
      </div>
    </div>
  </div>

</div>
{% endblock %}
