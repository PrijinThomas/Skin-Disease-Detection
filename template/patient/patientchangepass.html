{% extends 'patient/patientlayout.html' %}
{% load static %}
{% block content %}

<div class="row justify-content-center py-5">
   <div class="col-md-6 col-lg-5">
      <div class="card border-0 shadow-lg position-relative overflow-hidden" style="border-radius: 24px;">
         <!-- Decorative Background Element -->
         <div class="position-absolute top-0 end-0 bg-primary opacity-10 rounded-circle"
            style="width: 150px; height: 150px; margin-top: -75px; margin-right: -75px;"></div>

         <div class="card-body p-4 p-md-5">
            <div class="text-center mb-5">
               <div
                  class="bg-primary-subtle rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                  style="width: 70px; height: 70px;">
                  <i class="ti ti-lock-access text-primary fs-8"></i>
               </div>
               <h3 class="fw-bold text-dark mb-1">Security Settings</h3>
               <p class="text-muted small">Update your account password to stay secure.</p>
            </div>

            <form action="{% url 'update_pass' %}" method="post">
               {% csrf_token %}

               <div class="mb-4">
                  <label class="form-label fw-semibold text-dark small text-uppercase tracking-wider">Current
                     Password</label>
                  <div class="input-group">
                     <span class="input-group-text bg-light border-end-0"><i
                           class="ti ti-shield-lock text-muted"></i></span>
                     <input type="password" name="o_pass" class="form-control bg-light border-start-0 py-2"
                        placeholder="Enter current password" required>
                  </div>
               </div>

               <div class="mb-4">
                  <label class="form-label fw-semibold text-dark small text-uppercase tracking-wider">New
                     Password</label>
                  <div class="input-group">
                     <span class="input-group-text bg-light border-end-0"><i class="ti ti-key text-muted"></i></span>
                     <input type="password" name="n_pass" class="form-control bg-light border-start-0 py-2"
                        placeholder="Min. 8 characters" required>
                  </div>
               </div>

               <div class="mb-4">
                  <label class="form-label fw-semibold text-dark small text-uppercase tracking-wider">Confirm New
                     Password</label>
                  <div class="input-group">
                     <span class="input-group-text bg-light border-end-0"><i
                           class="ti ti-circle-check text-muted"></i></span>
                     <input type="password" name="c_pass" class="form-control bg-light border-start-0 py-2"
                        placeholder="Repeat new password" required>
                  </div>
               </div>

               <div class="d-grid mt-5">
                  <button type="submit" class="btn btn-primary py-3 rounded-pill fw-bold shadow">
                     <i class="ti ti-refresh me-2"></i> Update Password
                  </button>
               </div>

               <div class="text-center mt-4">
                  <a href="{% url 'patient_dashboard' %}" class="text-muted small text-decoration-none">
                     <i class="ti ti-arrow-left me-1"></i> Back to Dashboard
                  </a>
               </div>
            </form>
         </div>
      </div>

      <!-- Security Tip -->
      <div class="card bg-warning-subtle border-0 mt-4 rounded-4 shadow-sm">
         <div class="card-body d-flex align-items-start gap-3">
            <i class="ti ti-bulb text-warning fs-6 mt-1"></i>
            <div>
               <h6 class="fw-bold text-warning mb-1">Security Tip</h6>
               <p class="mb-0 small text-dark-emphasis">Use a combination of uppercase letters, numbers, and symbols for
                  a stronger password.</p>
            </div>
         </div>
      </div>
   </div>
</div>

{% endblock %}
